name: Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Node.js kur
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Bagimliliklari kur
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          npm ci

      - name: Surum etiketini dogrula
        run: python scripts/check_release_tag.py "${{ github.ref_name }}"

      - name: CSS ve Windows varliklarini uret
        shell: pwsh
        run: |
          npm run build:css
          python scripts/generate_build_assets.py

      - name: Testleri calistir
        run: python -m pytest

      - name: Windows uygulamasini paketle
        run: pyinstaller --clean --noconfirm KantarServisi.spec

      - name: Paketlenmis servisi test et
        shell: pwsh
        run: |
          $env:KANTAR_VERI_DIZINI = Join-Path $env:RUNNER_TEMP "kantar-servisi-test"
          $env:KANTAR_SERVIS_PORT = "18080"
          $process = Start-Process ".\dist\KantarServisi\KantarServisi.exe" -ArgumentList "--server" -PassThru
          try {
            $hazir = $false
            1..80 | ForEach-Object {
              Start-Sleep -Milliseconds 250
              try {
                $cevap = Invoke-RestMethod "http://127.0.0.1:18080/saglik" -TimeoutSec 2
                if ($cevap.ok -eq $true) {
                  $hazir = $true
                  return
                }
              } catch {
              }
            }
            if (-not $hazir) {
              throw "Paketlenmis Kantar Servisi saglik kontrolunu gecemedi."
            }
          } finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Uygulama EXE dosyasini istege bagli imzala
        if: env.WINDOWS_CERTIFICATE_BASE64 != ''
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName |
            Select-Object -Last 1
          & $signtool.FullName sign /fd SHA256 /tr "http://timestamp.digicert.com" /td SHA256 /f $certificatePath /p $env:WINDOWS_CERTIFICATE_PASSWORD ".\dist\KantarServisi\KantarServisi.exe"

      - name: Inno Setup kur
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Windows kurulum dosyasini olustur
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $version = "${{ github.ref_name }}".TrimStart("v")
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DAppVersion=$version" ".\packaging\windows\KantarServisi.iss"

      - name: Kurulum EXE dosyasini istege bagli imzala
        if: env.WINDOWS_CERTIFICATE_BASE64 != ''
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
          if (-not (Test-Path $certificatePath)) {
            [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          }
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName |
            Select-Object -Last 1
          & $signtool.FullName sign /fd SHA256 /tr "http://timestamp.digicert.com" /td SHA256 /f $certificatePath /p $env:WINDOWS_CERTIFICATE_PASSWORD ".\release\Kantar-Servisi-Setup.exe"

      - name: Portable paket ve checksum olustur
        shell: pwsh
        run: |
          Compress-Archive -Path ".\dist\KantarServisi" -DestinationPath ".\release\Kantar-Servisi-Portable.zip" -Force
          $dosyalar = @(
            ".\release\Kantar-Servisi-Setup.exe",
            ".\release\Kantar-Servisi-Portable.zip"
          )
          $satirlar = $dosyalar | ForEach-Object {
            $hash = Get-FileHash $_ -Algorithm SHA256
            "$($hash.Hash.ToLower())  $([IO.Path]::GetFileName($_))"
          }
          $satirlar | Set-Content ".\release\SHA256SUMS.txt" -Encoding ascii

      - name: Derleme varliklarini sakla
        uses: actions/upload-artifact@v4
        with:
          name: kantar-servisi-${{ github.ref_name }}
          path: |
            release/Kantar-Servisi-Setup.exe
            release/Kantar-Servisi-Portable.zip
            release/SHA256SUMS.txt

      - name: GitHub Release yayinla
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $dosyalar = @(
            ".\release\Kantar-Servisi-Setup.exe",
            ".\release\Kantar-Servisi-Portable.zip",
            ".\release\SHA256SUMS.txt"
          )
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $dosyalar --clobber
          } else {
            gh release create $tag $dosyalar --title "Kantar Servisi $tag" --generate-notes
          }
