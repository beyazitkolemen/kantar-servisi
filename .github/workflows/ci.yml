name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Python bagimliliklarini kur
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: CSS uret
        run: npm ci && npm run build:css

      - name: Uretilen CSS guncel mi
        run: git diff --exit-code -- kantar_servis/static/app.css

      - name: Testleri calistir
        run: python -m pytest

      - name: Python paketini dogrula
        run: python -m build
