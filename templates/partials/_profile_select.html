<form method="get" action="/ayarlar" class="rounded-xl border border-slate-200 bg-slate-50 p-4">
  <label class="{{ label_class }}" for="profil-secimi">Profil</label>
  <div class="mt-2 flex flex-col gap-3 sm:flex-row">
    <select id="profil-secimi" name="profil" class="{{ input_class }}">
      {% for profil_adi in profiller %}
        <option value="{{ profil_adi }}" {% if profil_adi == profil %}selected{% endif %}>{{ profil_adi }}</option>
      {% endfor %}
    </select>
    <button type="submit" class="inline-flex justify-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-700">Profili Ac</button>
  </div>
</form>
