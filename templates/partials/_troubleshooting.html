<div class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-700">
  <h2 class="text-base font-bold text-slate-900">Sorun Giderme</h2>
  <div class="mt-3 space-y-3">
    {% for madde in sorun_giderme %}
      <details class="rounded-lg bg-white p-3 ring-1 ring-slate-200">
        <summary class="cursor-pointer font-semibold text-slate-900">{{ madde.baslik }}</summary>
        <p class="mt-2 text-slate-600">{{ madde.aciklama }}</p>
      </details>
    {% endfor %}
  </div>
</div>
